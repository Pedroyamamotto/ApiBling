services:
  - type: web
    name: api-bling
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: DBservisos
      - key: RESEND_API_KEY
        sync: false